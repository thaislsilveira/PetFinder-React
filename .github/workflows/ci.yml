name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-tests:
    name: Web unit tests & Storybook build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petfinder-web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: petfinder-web/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn test

      - run: yarn build-storybook

  backend-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petfinder-backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: petfinder-backend/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn test

  e2e-tests:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: |
            petfinder-backend/yarn.lock
            petfinder-web/yarn.lock
            e2e/yarn.lock

      - name: Install backend dependencies
        working-directory: petfinder-backend
        run: yarn install --frozen-lockfile

      - name: Install web dependencies
        working-directory: petfinder-web
        run: yarn install --frozen-lockfile

      - name: Install e2e dependencies
        working-directory: e2e
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: yarn test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
