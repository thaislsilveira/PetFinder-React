name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-tests:
    name: Web unit tests & Storybook build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: petfinder-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: petfinder-web/yarn.lock

      - run: yarn install --frozen-lockfile

      - run: yarn test

      - run: yarn build-storybook
